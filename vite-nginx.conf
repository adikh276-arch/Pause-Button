server {
    listen 80;

    location = / {
        return 301 /pause_button/;
    }

    location /pause_button/ {
        alias /usr/share/nginx/html/pause_button/;
        index index.html;
        try_files $uri $uri/ /pause_button/index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /pause_button/index.html;
    }

    error_page 404 /pause_button/index.html;
}
